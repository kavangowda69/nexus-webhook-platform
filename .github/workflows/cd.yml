name: CD Pipeline

on:
  push:
    branches: ["main"]

jobs:

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nexus-webhook-api:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nexus-webhook-worker:latest

      - name: Build and push Receiver image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.receiver
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nexus-webhook-receiver:latest