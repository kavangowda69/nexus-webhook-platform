name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flake8

      - name: Run flake8
        run: flake8 api/ --max-line-length=120 --exclude=__pycache__


  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: webhook_user
          POSTGRES_PASSWORD: webhook_pass
          POSTGRES_DB: webhook_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql://webhook_user:webhook_pass@localhost:5432/webhook_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: pytest tests/ -v


  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image for scanning
        run: docker build -f dockerfile -t nexus-webhook-api:scan .

      - name: Run Trivy on API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nexus-webhook-api:scan
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Build Receiver image for scanning
        run: docker build -f Dockerfile.receiver -t nexus-webhook-receiver:scan .

      - name: Run Trivy on Receiver image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nexus-webhook-receiver:scan
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true


  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f dockerfile -t nexus-webhook-api:latest .

      - name: Build Worker image
        run: docker build -f dockerfile -t nexus-webhook-worker:latest .

      - name: Build Receiver image
        run: docker build -f Dockerfile.receiver -t nexus-webhook-receiver:latest .