services:

  webhook_postgres:
    image: postgres:15
    container_name: webhook_postgres
    environment:
      POSTGRES_USER: webhook_user
      POSTGRES_PASSWORD: webhook_pass
      POSTGRES_DB: webhook_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook_user -d webhook_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  webhook_redis:
    image: redis:7
    container_name: webhook_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  webhook_api:
    build:
      context: .
      dockerfile: dockerfile
    container_name: webhook_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      webhook_postgres:
        condition: service_healthy
      webhook_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  webhook_worker:
    build:
      context: .
      dockerfile: dockerfile
    container_name: webhook_worker
    command: python -m api.worker.worker
    env_file: .env
    depends_on:
      webhook_postgres:
        condition: service_healthy
      webhook_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; redis.Redis(host='webhook_redis', port=6379).ping()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  webhook_receiver:
    build:
      context: .
      dockerfile: Dockerfile.receiver
    container_name: webhook_receiver
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3