apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-api
  template:
    metadata:
      labels:
        app: webhook-api
    spec:
      containers:
        - name: webhook-api
          image: nexus-webhook-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: webhook-api
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080