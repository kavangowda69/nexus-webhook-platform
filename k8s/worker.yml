apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webhook-worker
  template:
    metadata:
      labels:
        app: webhook-worker
    spec:
      containers:
        - name: webhook-worker
          image: nexus-webhook-worker:latest
          imagePullPolicy: Never
          command: ["python", "-m", "api.worker.worker"]
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secret
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"